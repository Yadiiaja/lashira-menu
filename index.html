<script>
document.querySelectorAll(".category button").forEach(function(btn){
  btn.addEventListener("click", function(){
    this.classList.toggle("active");
    var content = this.nextElementSibling;
    content.style.display = content.style.display === "block" ? "none" : "block";
  });
});

function sendOrder(){
  const number = '628979322525';
  let items = [];
  document.querySelectorAll('.item').forEach(function(item){
    const checkbox = item.querySelector('input[type="checkbox"]');
    const noteInput = item.querySelector('input[type="text"]');
    if(checkbox.checked){
      let line = checkbox.value;
      if(noteInput.value.trim() !== '') line += ' (Keterangan: ' + noteInput.value.trim() + ')';
      items.push(line);
    }
  });
  if(items.length===0){ alert('Silakan pilih minimal 1 menu.'); return; }
  const text = 'Halo, saya mau pesan:\n' + items.join('\n');
  window.open(`https://wa.me/${number}?text=${encodeURIComponent(text)}`, '_blank');
}
</script>
